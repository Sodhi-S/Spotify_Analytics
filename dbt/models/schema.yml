version: 2

models:
  - name: stg_recent_tracks
    columns:
      - name: user_id
        tests: [not_null]
      - name: listen_id
        tests: [not_null, unique]
      - name: track_id
        tests: [not_null]
      - name: artist_id
        tests: [not_null]
      - name: track_name
        tests: [not_null]
      - name: artist_name
        tests: [not_null]
      - name: played_at
        tests: [not_null]

  - name: fact_listens
    columns:
      - name: user_id
        tests: [not_null]
      - name: listen_id
        tests: [not_null, unique]
      - name: track_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_tracks')
                field: track_id
      - name: artist_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_artists')
                field: artist_id
      - name: date_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_dates')
                field: date_id
      - name: played_at
        tests: [not_null]

  - name: dim_tracks
    columns:
      - name: track_id
        tests: [not_null, unique]
      - name: name
        tests: [not_null]
      - name: artist_id
        tests: [not_null]
      - name: album_image_url
      - name: album_image_source
      - name: mood_label
        tests:
          - accepted_values:
              arguments:
                values: ['happy', 'sad', 'angry', 'calm', 'energetic', 'melancholic']

  - name: dim_artists
    columns:
      - name: artist_version_id
        tests: [not_null, unique]
      - name: artist_id
        tests: [not_null]
      - name: name
        tests: [not_null]
      - name: image_url
      - name: image_source
      - name: is_current
        tests:
          - accepted_values:
              arguments:
                values: [true, false]
                quote: false

  - name: dim_dates
    columns:
      - name: date_id
        tests: [not_null, unique]
      - name: day_of_week
        tests:
          - accepted_values:
              arguments:
                values: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun']
      - name: is_weekend
        tests:
          - accepted_values:
              arguments:
                values: [true, false]
                quote: false

  - name: mart_listening_summary
    columns:
      - name: user_id
        tests: [not_null]
      - name: date_id
        tests: [not_null]
      - name: total_listens
        tests: [not_null]

  - name: mart_tag_listen_counts
    columns:
      - name: user_id
        tests: [not_null]
      - name: date_id
        tests: [not_null]
      - name: tag
        tests: [not_null]
      - name: listen_count
        tests: [not_null]

  - name: mart_datetime_listens
    columns:
      - name: listen_id
        tests: [not_null, unique]
      - name: track_id
        tests: [not_null]
      - name: artist_id
        tests: [not_null]
      - name: local_date
        tests: [not_null]
      - name: local_hour
        tests: [not_null]
      - name: day_of_week
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun']
      - name: is_weekend
        tests:
          - accepted_values:
              arguments:
                values: [true, false]
                quote: false

  - name: dim_weather
    columns:
      - name: date_id
        tests: [not_null]
      - name: city
        tests: [not_null]
      - name: weather_category
        tests: [not_null]
      - name: season
        tests:
          - accepted_values:
              arguments:
                values: ['Winter', 'Spring', 'Summer', 'Fall']
      - name: had_precipitation
        tests:
          - accepted_values:
              arguments:
                values: [true, false]
                quote: false
