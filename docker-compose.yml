services:
  postgres:
    image: postgres:16
    container_name: spotify_analytics_postgres
    environment:
      POSTGRES_DB: music_intelligence
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d music_intelligence"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
